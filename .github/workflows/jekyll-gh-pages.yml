# JGVRP Bank 봇 이용약관 (JGVRP 서버 전용)

### 제 1 조 (목적 및 정의)
1. 본 약관은 'JGVRP' 디스코드 커뮤니티 서버(이하 '본 서버') 내에서만 전용으로 구동되는 'JGVRP Bank' 디스코드 애플리케이션(이하 '봇')이 제공하는 가상 경제 및 모의 금융 서비스(이하 '서비스')를 이용함에 있어, 봇 개발자 및 운영진(이하 '운영진')과 유저(이하 '이용자') 간의 권리, 의무, 책임 사항 및 서비스 이용 조건에 관한 법적 청사진을 규정함을 목적으로 합니다.
2. 본 약관에서 사용하는 '가상 재화'라 함은 로블록스(Roblox) 플랫폼의 '그린빌(Greenville)' 게임을 매개로 진행되는 가상 상황극(Roleplay) 내에서만 통용되도록 봇 데이터베이스에 기록되는 가상의 포인트, 달러, 통계 수치 등을 의미합니다.

### 제 2 조 (약관의 효력, 동의 및 변경)
1. 본 약관은 본 서버에 참여 중인 이용자가 봇의 명령어를 최초로 입력하거나, 봇이 제공하는 가상 계좌 개설 절차에 동의하는 시점부터 효력이 발생하며, 이는 약관 전체에 대한 명확한 동의로 간주됩니다.
2. 본 봇은 JGVRP 서버 전용 애플리케이션으로, 외부 디스코드 서버로의 무단 초대 및 공유를 전면 금지하며 이를 시도할 경우 서비스 이용이 영구 제한될 수 있습니다.

### 제 3 조 (서비스의 제공 및 중단)
운영진은 가상 경제 서비스를 24시간 제공하는 것을 원칙으로 하나, 디스코드 API 장애, 로블록스 서버 점검, 데이터베이스 점검 등 불가항력적 사유 발생 시 서비스가 일시 중단될 수 있습니다.

### 제 4 조 (이용자의 의무 및 금지행위)
이용자는 시스템 취약점이나 버그를 고의로 악용하여 가상 재화를 무단 복사·조작하거나, 타인의 ID를 도용하여 자산에 접근하는 행위, 매크로를 이용해 비정상적 이득을 취하는 행위를 해서는 안 되며, 위반 시 봇 데이터 초기화 및 서버 영구 차단 조치됩니다.

### 제 5 조 (가상 재화의 법적 권리 및 면책 조항)
> 본 봇에서 관리되는 모든 데이터는 100% 가상 경제 역할극을 위한 데이터이며, 현실의 실제 자산이나 화폐와는 아무런 연관이 없습니다. 이용자 간의 현실 재화를 이용한 가상 자산 거래 적발 시 즉시 영구 제재 처리됩니다.

시스템 오류, 호스팅 만료, 데이터베이스 초기화(Wipe) 등으로 발생한 가상 재화 손실에 대하여 운영진은 어떠한 보상 및 손해배상 책임도 지지 않습니다.

*시행일: 2026년 7월 1일*
